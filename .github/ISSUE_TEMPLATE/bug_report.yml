name: Bug Report
description: Report a bug in HarnessGate
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly and concisely.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Configure harnessgate.yaml with ...
        2. Run `pnpm start`
        3. Send a message via ...
        4. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: HarnessGate version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: channel
    attributes:
      label: Channel
      options:
        - Web
        - Telegram
        - Discord
        - Slack
        - Other
    validations:
      required: false
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - Claude Managed Agents
        - HTTP
        - Custom
    validations:
      required: false
